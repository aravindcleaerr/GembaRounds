<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c084fc"/>
      <stop offset="100%" style="stop-color:#f472b6"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="url(#bg)"/>
  <!-- Walking person silhouette -->
  <g transform="translate(256, 240)" fill="white">
    <!-- Head -->
    <circle cx="-10" cy="-110" r="32"/>
    <!-- Body -->
    <path d="M-10,-78 L-10,-20 L-45,50 L-25,55 L5,0 L35,55 L55,50 L20,-20 Z" fill="white" opacity="0.95"/>
    <!-- Arms with clipboard -->
    <path d="M-10,-60 L-55,-30 M-10,-55 L40,-25" stroke="white" stroke-width="12" stroke-linecap="round" fill="none"/>
    <!-- Clipboard -->
    <rect x="25" y="-45" width="40" height="50" rx="6" fill="url(#accent)" opacity="0.9"/>
    <line x1="32" y1="-32" x2="58" y2="-32" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <line x1="32" y1="-22" x2="58" y2="-22" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <line x1="32" y1="-12" x2="50" y2="-12" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <!-- Checkmark on clipboard -->
    <path d="M35,2 L42,10 L55,-5" stroke="#10b981" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
  <!-- Circular motion lines -->
  <path d="M380,120 A180,180 0 0,1 420,260" stroke="white" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.4"/>
  <path d="M395,140 A160,160 0 0,1 430,250" stroke="white" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.25"/>
  <!-- Text: GR -->
  <text x="256" y="430" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="800" fill="white" letter-spacing="-2" opacity="0.9">GR</text>
</svg>

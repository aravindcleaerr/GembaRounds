<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#0f172a"/>
  <meta name="apple-mobile-web-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <link rel="manifest" href="/manifest.json"/>
  <title>GembaRounds</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #f0f4ff;
      --surface: #ffffff;
      --surface-hover: #f1f5f9;
      --border: #e2e8f0;
      --border-light: #f1f5f9;
      --text: #0f172a;
      --text-secondary: #64748b;
      --text-muted: #94a3b8;
      --primary: #6366f1;
      --primary-light: #eef2ff;
      --primary-dark: #4f46e5;
      --success: #10b981;
      --success-light: #ecfdf5;
      --danger: #ef4444;
      --danger-light: #fef2f2;
      --warning: #f59e0b;
      --warning-light: #fffbeb;
      --info: #3b82f6;
      --info-light: #eff6ff;
      --purple: #8b5cf6;
      --purple-light: #f5f3ff;
      --gradient-primary: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      --gradient-success: linear-gradient(135deg, #10b981 0%, #34d399 100%);
      --gradient-danger: linear-gradient(135deg, #ef4444 0%, #f87171 100%);
      --gradient-warning: linear-gradient(135deg, #f59e0b 0%, #fbbf24 100%);
      --gradient-dark: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #312e81 100%);
      --gradient-sidebar: linear-gradient(180deg, #0f172a 0%, #1e1b4b 100%);
      --radius: 16px;
      --radius-sm: 10px;
      --radius-xs: 6px;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
      --shadow: 0 2px 8px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 12px rgba(99,102,241,0.08), 0 2px 4px rgba(0,0,0,0.04);
      --shadow-lg: 0 12px 24px rgba(99,102,241,0.12), 0 4px 8px rgba(0,0,0,0.06);
      --shadow-glow: 0 0 20px rgba(99,102,241,0.15);
      --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
      --nav-height: 68px;
      --bottom-nav: 76px;
    }

    /* ===== DARK MODE ===== */
    [data-theme="dark"] {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface-hover: #334155;
      --border: #334155;
      --border-light: #1e293b;
      --text: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --primary: #818cf8;
      --primary-light: rgba(99,102,241,0.15);
      --primary-dark: #6366f1;
      --success: #34d399;
      --success-light: rgba(16,185,129,0.15);
      --danger: #f87171;
      --danger-light: rgba(239,68,68,0.15);
      --warning: #fbbf24;
      --warning-light: rgba(245,158,11,0.15);
      --info: #60a5fa;
      --info-light: rgba(59,130,246,0.15);
      --purple: #a78bfa;
      --purple-light: rgba(139,92,246,0.15);
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
      --shadow: 0 2px 8px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.2);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.3), 0 2px 4px rgba(0,0,0,0.2);
      --shadow-lg: 0 12px 24px rgba(0,0,0,0.4), 0 4px 8px rgba(0,0,0,0.3);
      --shadow-glow: 0 0 20px rgba(99,102,241,0.25);
    }
    [data-theme="dark"] body {
      background-image:
        radial-gradient(circle at 20% 20%, rgba(99,102,241,0.06) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(139,92,246,0.04) 0%, transparent 50%);
    }
    [data-theme="dark"] .card {
      border-color: var(--border);
    }
    [data-theme="dark"] .stat-card {
      border-color: var(--border);
    }
    [data-theme="dark"] .page-title {
      background: linear-gradient(135deg, #e2e8f0, #818cf8);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    [data-theme="dark"] .auth-card {
      background: rgba(30,41,59,0.95);
      border-color: rgba(255,255,255,0.08);
    }
    [data-theme="dark"] .form-input:focus,
    [data-theme="dark"] .form-select:focus,
    [data-theme="dark"] .form-textarea:focus {
      background: var(--surface);
    }
    [data-theme="dark"] .review-box {
      background: rgba(16,185,129,0.1);
      border-color: rgba(52,211,153,0.2);
    }
    [data-theme="dark"] .review-form-box {
      background: rgba(245,158,11,0.1);
      border-color: rgba(251,191,36,0.2);
    }

    /* Theme toggle button */
    .theme-toggle {
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.85); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: var(--transition); padding: 0;
    }
    .theme-toggle:hover { background: rgba(255,255,255,0.2); }
    .theme-toggle .mi { font-size: 20px; }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-tap-highlight-color: transparent; scroll-behavior: smooth; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      background-image:
        radial-gradient(circle at 20% 20%, rgba(99,102,241,0.04) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(139,92,246,0.03) 0%, transparent 50%);
      color: var(--text);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    /* Icons helper */
    .mi { font-family: 'Material Icons Round'; font-size: 20px; vertical-align: middle; line-height: 1; }
    .mi-sm { font-size: 16px; }
    .mi-lg { font-size: 24px; }

    /* ===== TOP NAV ===== */
    .topnav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: var(--nav-height);
      background: var(--gradient-dark);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 1.5rem;
      transition: var(--transition);
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    }
    .topnav-brand {
      display: flex; align-items: center; gap: 0.7rem;
      font-weight: 800; font-size: 1.3rem; color: white;
      letter-spacing: -0.02em;
    }
    .topnav-brand .logo-icon {
      width: 40px; height: 40px; border-radius: 12px;
      background: linear-gradient(135deg, #818cf8, #c084fc);
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 20px;
      box-shadow: 0 4px 12px rgba(129,140,248,0.4);
    }
    .topnav-actions { display: flex; align-items: center; gap: 0.5rem; }
    .topnav-user {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.4rem 0.85rem; border-radius: 100px;
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
      font-size: 0.8rem; font-weight: 500; color: rgba(255,255,255,0.85);
      cursor: pointer; transition: var(--transition);
    }
    .topnav-user:hover { background: rgba(255,255,255,0.2); }
    .topnav-user .avatar {
      width: 30px; height: 30px; border-radius: 50%;
      background: linear-gradient(135deg, #818cf8, #f472b6);
      color: white; display: flex; align-items: center; justify-content: center;
      font-size: 0.72rem; font-weight: 700;
      box-shadow: 0 2px 8px rgba(129,140,248,0.3);
    }

    /* ===== DESKTOP SIDE NAV ===== */
    .sidenav {
      display: none;
      position: fixed; top: var(--nav-height); left: 0; bottom: 0;
      width: 240px; background: var(--gradient-sidebar);
      padding: 1.25rem 0.75rem; z-index: 90;
      overflow-y: auto;
    }
    .sidenav-item {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.7rem 0.9rem; border-radius: var(--radius-sm);
      font-size: 0.875rem; font-weight: 500; color: rgba(255,255,255,0.6);
      cursor: pointer; transition: var(--transition); border: none; background: none;
      width: 100%; text-align: left;
    }
    .sidenav-item:hover { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.9); }
    .sidenav-item.active {
      background: linear-gradient(135deg, rgba(99,102,241,0.3), rgba(139,92,246,0.2));
      color: white; font-weight: 600;
      box-shadow: 0 0 12px rgba(99,102,241,0.2);
      border: 1px solid rgba(99,102,241,0.3);
    }
    .sidenav-section {
      font-size: 0.68rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.08em; color: rgba(255,255,255,0.3);
      padding: 1rem 0.9rem 0.4rem; margin-top: 0.5rem;
    }

    /* ===== BOTTOM NAV (mobile) ===== */
    .bottomnav {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
      height: var(--bottom-nav);
      background: rgba(15,23,42,0.97);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      display: flex !important; align-items: center; justify-content: space-around;
      padding-bottom: env(safe-area-inset-bottom, 0);
      box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
    }
    .bottomnav-item {
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      font-size: 0.62rem; font-weight: 600; color: rgba(255,255,255,0.4);
      cursor: pointer; padding: 0.5rem 0.7rem; border: none; background: none;
      transition: var(--transition); position: relative; min-width: 56px;
      letter-spacing: 0.02em;
    }
    .bottomnav-item .mi { font-size: 24px; }
    .bottomnav-item.active { color: #818cf8; }
    .bottomnav-item.active .mi {
      background: linear-gradient(135deg, rgba(99,102,241,0.2), rgba(139,92,246,0.15));
      border-radius: 12px; padding: 4px 12px;
    }
    .bottomnav-badge {
      position: absolute; top: 2px; right: 8px;
      width: 8px; height: 8px; background: var(--danger); border-radius: 50%;
      box-shadow: 0 0 6px rgba(239,68,68,0.5);
    }

    /* ===== MAIN CONTENT ===== */
    .main-wrapper {
      padding-top: var(--nav-height);
      padding-bottom: calc(var(--bottom-nav) + 1rem);
      min-height: 100vh;
    }
    .main-content {
      padding: 1.25rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    /* ===== CARDS ===== */
    .card {
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.7);
      border-radius: var(--radius);
      padding: 1.35rem;
      margin-bottom: 1rem;
      transition: var(--transition);
      box-shadow: var(--shadow);
    }
    .card-hover:hover { box-shadow: var(--shadow-lg); border-color: transparent; transform: translateY(-1px); }
    .card-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap;
    }
    .card-title {
      font-size: 1rem; font-weight: 700; color: var(--text);
      display: flex; align-items: center; gap: 0.5rem;
    }
    .card-subtitle { font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.15rem; }
    .card-accent-left { border-left: 4px solid transparent; border-image: var(--gradient-primary) 1; }
    .card-accent-success { border-left: 4px solid transparent; border-image: var(--gradient-success) 1; }
    .card-accent-danger { border-left: 4px solid transparent; border-image: var(--gradient-danger) 1; }
    .card-accent-purple { border-left: 4px solid transparent; border-image: linear-gradient(180deg, #8b5cf6, #c084fc) 1; }

    /* ===== PAGE HEADER ===== */
    .page-header { margin-bottom: 1.25rem; }
    .page-title {
      font-size: 1.5rem; font-weight: 800;
      letter-spacing: -0.03em; line-height: 1.2;
      background: linear-gradient(135deg, #0f172a, #4f46e5);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .page-subtitle { font-size: 0.85rem; color: var(--text-secondary); margin-top: 0.25rem; }

    /* ===== BUTTONS ===== */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 0.4rem;
      font-family: inherit; font-size: 0.85rem; font-weight: 600;
      padding: 0.55rem 1.1rem; border-radius: var(--radius-sm);
      border: none; cursor: pointer; transition: var(--transition);
      white-space: nowrap; line-height: 1.4;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--gradient-primary); color: white; box-shadow: 0 4px 12px rgba(99,102,241,0.3); }
    .btn-primary:hover { box-shadow: 0 6px 20px rgba(99,102,241,0.4); transform: translateY(-1px); }
    .btn-success { background: var(--gradient-success); color: white; box-shadow: 0 4px 12px rgba(16,185,129,0.3); }
    .btn-success:hover { box-shadow: 0 6px 20px rgba(16,185,129,0.4); transform: translateY(-1px); }
    .btn-danger { background: var(--gradient-danger); color: white; box-shadow: 0 4px 12px rgba(239,68,68,0.3); }
    .btn-danger:hover { box-shadow: 0 6px 20px rgba(239,68,68,0.4); transform: translateY(-1px); }
    .btn-warning { background: var(--gradient-warning); color: white; box-shadow: 0 4px 12px rgba(245,158,11,0.3); }
    .btn-warning:hover { box-shadow: 0 6px 20px rgba(245,158,11,0.4); transform: translateY(-1px); }
    .btn-ghost {
      background: transparent; color: var(--text-secondary);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: var(--surface-hover); color: var(--text); }
    .btn-sm { padding: 0.35rem 0.7rem; font-size: 0.78rem; border-radius: var(--radius-xs); }
    .btn-lg { padding: 0.75rem 1.5rem; font-size: 0.95rem; }
    .btn-icon {
      width: 36px; height: 36px; padding: 0; border-radius: var(--radius-sm);
      background: var(--surface-hover); border: 1px solid var(--border); color: var(--text-secondary);
    }
    .btn-icon:hover { background: var(--border); }
    .btn-block { width: 100%; }

    /* ===== FORMS ===== */
    .form-group { margin-bottom: 0.85rem; }
    .form-label {
      display: block; font-size: 0.78rem; font-weight: 600;
      color: var(--text-secondary); margin-bottom: 0.3rem;
      text-transform: uppercase; letter-spacing: 0.03em;
    }
    .form-input, .form-select, .form-textarea {
      width: 100%; padding: 0.65rem 0.9rem;
      font-family: inherit; font-size: 0.9rem;
      background: var(--bg); border: 2px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text);
      transition: var(--transition); outline: none;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus {
      border-color: var(--primary); background: white;
      box-shadow: 0 0 0 4px rgba(99,102,241,0.12), 0 2px 8px rgba(99,102,241,0.08);
    }
    .form-input::placeholder, .form-textarea::placeholder {
      color: var(--text-muted); font-weight: 400;
    }
    .form-textarea { min-height: 80px; resize: vertical; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.75rem; }
    .form-hint { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.2rem; }

    /* ===== STATS GRID ===== */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 0.75rem; margin-bottom: 1rem;
    }
    .stat-card {
      background: var(--surface); border: 1px solid rgba(255,255,255,0.8);
      padding: 1.1rem 0.8rem; border-radius: var(--radius); text-align: center;
      transition: var(--transition); cursor: default;
      box-shadow: var(--shadow);
      position: relative; overflow: hidden;
    }
    .stat-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: var(--gradient-primary); opacity: 0;
      transition: var(--transition);
    }
    .stat-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }
    .stat-card:hover::before { opacity: 1; }
    .stat-card.clickable { cursor: pointer; }
    .stat-card.clickable.selected { border-color: var(--primary); box-shadow: var(--shadow-glow); }
    .stat-card.clickable.selected::before { opacity: 1; }
    .stat-value {
      font-size: 1.85rem; font-weight: 800; color: var(--text);
      letter-spacing: -0.03em; line-height: 1;
    }
    .stat-label {
      font-size: 0.7rem; font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.05em; margin-top: 0.4rem;
    }

    /* ===== TAGS ===== */
    .tag {
      display: inline-flex; align-items: center; gap: 0.2rem;
      padding: 0.15rem 0.55rem; border-radius: 100px;
      font-size: 0.7rem; font-weight: 600; letter-spacing: 0.01em;
    }
    .tag-primary { background: var(--primary-light); color: var(--primary); }
    .tag-success { background: var(--success-light); color: var(--success); }
    .tag-danger { background: var(--danger-light); color: var(--danger); }
    .tag-warning { background: var(--warning-light); color: var(--warning); }
    .tag-info { background: var(--info-light); color: var(--info); }
    .tag-purple { background: var(--purple-light); color: var(--purple); }
    .tag-neutral { background: var(--surface-hover); color: var(--text-secondary); }
    .tag-dark { background: linear-gradient(135deg, #1e293b, #334155); color: white; }

    /* ===== TOGGLE (Positive / Negative) ===== */
    .toggle-group {
      display: flex; gap: 0; border: 1.5px solid var(--border);
      border-radius: var(--radius-sm); overflow: hidden; margin-bottom: 1rem;
    }
    .toggle-btn {
      flex: 1; padding: 0.65rem; font-family: inherit; font-size: 0.85rem;
      font-weight: 600; border: none; cursor: pointer;
      background: var(--surface); color: var(--text-secondary);
      transition: var(--transition); display: flex; align-items: center;
      justify-content: center; gap: 0.4rem;
    }
    .toggle-btn.active-pos { background: var(--gradient-success); color: white; box-shadow: 0 4px 12px rgba(16,185,129,0.25); }
    .toggle-btn.active-neg { background: var(--gradient-danger); color: white; box-shadow: 0 4px 12px rgba(239,68,68,0.25); }

    /* ===== STATUS BADGES ===== */
    .status-badge {
      padding: 0.2rem 0.6rem; border-radius: 100px;
      font-size: 0.7rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .status-scheduled { background: var(--info-light); color: var(--info); }
    .status-in-progress { background: var(--warning-light); color: #b45309; }
    .status-completed { background: var(--success-light); color: #047857; }

    /* ===== OBSERVATION ITEMS ===== */
    .obs-item {
      padding: 1rem; margin-bottom: 0.6rem;
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      transition: var(--transition);
    }
    .obs-item:hover { border-color: var(--primary); box-shadow: var(--shadow-md); transform: translateY(-1px); }
    .obs-item.type-positive { border-left: 3px solid var(--success); }
    .obs-item.type-negative { border-left: 3px solid var(--danger); }
    .obs-tags { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-bottom: 0.4rem; }
    .obs-title { font-weight: 600; font-size: 0.9rem; margin-bottom: 0.25rem; }
    .obs-desc { font-size: 0.85rem; color: var(--text-secondary); line-height: 1.5; }
    .obs-meta-row {
      display: flex; flex-wrap: wrap; gap: 0.75rem;
      margin-top: 0.5rem; font-size: 0.78rem; color: var(--text-muted);
    }
    .obs-meta-row span { display: flex; align-items: center; gap: 0.2rem; }
    .obs-time { font-size: 0.72rem; color: var(--text-muted); margin-top: 0.35rem; }

    /* ===== WALK CARDS ===== */
    .walk-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.85rem 1rem; border: 1px solid var(--border);
      border-radius: var(--radius-sm); margin-bottom: 0.5rem;
      transition: var(--transition); gap: 0.75rem; flex-wrap: wrap;
    }
    .walk-item:hover { border-color: var(--primary); background: var(--primary-light); box-shadow: var(--shadow-md); transform: translateY(-1px); }
    .walk-info h4 { font-size: 0.9rem; font-weight: 600; margin: 0 0 0.15rem 0; }
    .walk-info p { margin: 0; font-size: 0.78rem; color: var(--text-muted); }
    .walk-actions { display: flex; gap: 0.4rem; align-items: center; flex-shrink: 0; }

    /* ===== REVIEW SECTION ===== */
    .review-box {
      background: var(--success-light); border: 1px solid #a7f3d0;
      border-radius: var(--radius-sm); padding: 0.85rem;
      margin-top: 0.6rem; width: 100%;
    }
    .review-form-box {
      background: var(--warning-light); border: 1px solid #fde68a;
      border-radius: var(--radius-sm); padding: 1rem;
      margin-top: 0.6rem; width: 100%;
    }

    /* ===== ATTACHMENT ZONE ===== */
    .upload-zone {
      border: 2px dashed var(--border); border-radius: var(--radius-sm);
      padding: 1rem; text-align: center; cursor: pointer;
      margin-bottom: 0.85rem; transition: var(--transition);

      return m[cat] || 'tag-neutral';

    // ============ AUTH ============
    function AuthPage({ onLogin }) {
      const [isLogin, setIsLogin] = useState(true);
      const [form, setForm] = useState({ name: '', email: '', password: '', role: 'operator', department: '', factory: '' });
      const [error, setError] = useState('');

      const handleSubmit = async () => {
        setError('');
        const sanitizedForm = { ...form, name: sanitize(form.name), email: sanitize(form.email), department: sanitize(form.department), factory: sanitize(form.factory || '') };
        const endpoint = isLogin ? '/api/auth/login' : '/api/auth/register';
        try {
          const res = await fetch(endpoint, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(sanitizedForm)
          });
          const data = await res.json();
          if (res.ok) {
            localStorage.setItem('gemba_token', data.token);
            localStorage.setItem('gemba_user', JSON.stringify(data.user));
            onLogin(data.user);
          } else { setError(data.error || 'Authentication failed'); }
        } catch { setError('Connection failed'); }
      };

      return (
        <div className="auth-bg">
          <div className="auth-card fade-in">
            <div className="auth-logo">
              <img src="/logo.svg" alt="GembaRounds" style={{ width: 80, height: 80, borderRadius: 20, marginBottom: '0.75rem' }} />
              <h2>GembaRounds</h2>
              <p>{isLogin ? 'Sign in to continue' : 'Create your account'}</p>
            </div>

            {error && <div className="auth-error">{error}</div>}

            {!isLogin && (
              <div className="form-group">
                <label className="form-label">Full Name</label>
                <input className="form-input" type="text" value={form.name} onChange={e => setForm({...form, name: e.target.value})} placeholder="Your name" />
              </div>
            )}
            <div className="form-group">
              <label className="form-label">Email</label>
              <input className="form-input" type="email" value={form.email} onChange={e => setForm({...form, email: e.target.value})} placeholder="email@company.com" />
            </div>
            <div className="form-group">
              <label className="form-label">Password</label>
              <input className="form-input" type="password" value={form.password} onChange={e => setForm({...form, password: e.target.value})} placeholder="Password"
                onKeyDown={e => { if (e.key === 'Enter') handleSubmit(); }} />
            </div>
            {!isLogin && (<>
              <div className="form-row">
                <div className="form-group">
                  <label className="form-label">Role</label>
                  <select className="form-select" value={form.role} onChange={e => setForm({...form, role: e.target.value})}>
                    <option value="operator">Operator</option>
                    <option value="supervisor">Supervisor</option>
                    <option value="manager">Manager</option>
                    <option value="leader">Leader</option>
                    <option value="admin">Admin</option>
                  </select>
                </div>
                <div className="form-group">
                  <label className="form-label">Department</label>
                  <input className="form-input" type="text" value={form.department} onChange={e => setForm({...form, department: e.target.value})} placeholder="Optional" />
                </div>
              </div>
              <div className="form-group">
                <label className="form-label">Factory / Plant</label>
                <input className="form-input" type="text" value={form.factory} onChange={e => setForm({...form, factory: e.target.value})} placeholder="e.g. Plant 1, Unit A (optional)" />
              </div>
            </>)}
            <button className="btn btn-primary btn-block btn-lg" onClick={handleSubmit} style={{ marginBottom: '0.5rem' }}>
              {isLogin ? 'Sign In' : 'Create Account'}
            </button>
            <button className="btn btn-ghost btn-block" onClick={() => { setIsLogin(!isLogin); setError(''); }}>
              {isLogin ? "Don't have an account? Register" : 'Already have an account? Sign In'}
            </button>
            <div className="auth-divider">or</div>
            <button className="btn btn-ghost btn-block btn-sm" onClick={() => onLogin({ name: 'Guest', role: 'operator', _id: 'guest' })} style={{ color: 'var(--text-muted)' }}>

    const NAV_ITEMS = [

      { id: 'walk', icon: 'directions_walk', label: 'Walk', managerOnly: true, needsWalk: true },
      { id: 'reports', icon: 'bar_chart', label: 'Reports' },
      { id: 'schedule', icon: 'calendar_month', label: 'Schedule', managerOnly: true },
      { id: 'history', icon: 'search', label: 'History' },

    // ============ MAIN APP ============
    function App() {
      const [currentView, setCurrentView] = useState('home');
      const [currentWalkId, setCurrentWalkId] = useState(null);
      const [user, setUser] = useState(null);
      const [theme, setTheme] = useState(() => {
        const saved = localStorage.getItem('gemba_theme');
        if (saved) return saved;
        return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      });
      const [lang, setLang] = useState(() => localStorage.getItem('gemba_lang') || 'en');

      useEffect(() => {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('gemba_theme', theme);
      }, [theme]);
      useEffect(() => { localStorage.setItem('gemba_lang', lang); }, [lang]);

      useEffect(() => {
        const mq = window.matchMedia('(prefers-color-scheme: dark)');
        const handler = (e) => {
          if (!localStorage.getItem('gemba_theme')) {
            setTheme(e.matches ? 'dark' : 'light');
          }
        };
        mq.addEventListener('change', handler);
        return () => mq.removeEventListener('change', handler);
      }, []);

      useEffect(() => {
        const savedUser = localStorage.getItem('gemba_user');
        if (savedUser) { try { setUser(JSON.parse(savedUser)); } catch {} }
      }, []);

      const handleLogin = (userData) => setUser(userData);
      const handleLogout = () => {
        localStorage.removeItem('gemba_token');
        localStorage.removeItem('gemba_user');
        setUser(null); setCurrentView('home');
      };

      if (!user) return <AuthPage onLogin={handleLogin} />;

      const startNewWalk = async (walkData) => {
        try {
          const response = await fetch('/api/walks/start-walk', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ...walkData, walker: walkData.walker || user.name })
          });
          const data = await response.json();
          setCurrentWalkId(data.walkId);
          setCurrentView('walk');
        } catch { alert('Failed to start walk'); }
      };

      const isManager = ['admin', 'leader', 'manager', 'supervisor'].includes(user.role);
      const initials = (user.name || 'U').split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);

      const isAdmin = user.role === 'admin';
      const navItems = NAV_ITEMS.filter(n => {
        if (n.managerOnly && !isManager) return false;
        if (n.adminOnly && !isAdmin) return false;
        if (n.needsWalk && !currentWalkId) return false;
        return true;
      });

      // Mobile bottom nav: show max 5 items
      const bottomItems = navItems.slice(0, 5);

      return (
        <LangContext.Provider value={lang}>
        <div>
          {/* Top Nav */}
          <nav className="topnav">
            <div className="topnav-brand">
              <img src="/logo.svg" alt="GR" style={{ width: 40, height: 40, borderRadius: 12 }} />

            </div>
            <div className="topnav-actions">
              <button className="theme-toggle" onClick={() => setLang(l => l === 'en' ? 'hi' : 'en')} title={lang === 'en' ? 'हिंदी में बदलें' : 'Switch to English'}

                {lang === 'en' ? 'हि' : 'EN'}
              </button>
              <button className="theme-toggle" onClick={() => setTheme(th => th === 'dark' ? 'light' : 'dark')} title={theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'}>
                <I n={theme === 'dark' ? 'light_mode' : 'dark_mode'} />
              </button>
              <div className="topnav-user" onClick={handleLogout} title="Click to logout">
                <div className="avatar">{initials}</div>
                <span className="user-name">{user.name}</span>
                <I n="logout" className="mi-sm" />
              </div>
            </div>
          </nav>

          {/* Desktop Side Nav */}
          <aside className="sidenav">
            <div className="sidenav-section">Navigation</div>
            {navItems.map(n => (
              <button key={n.id}
                className={`sidenav-item ${currentView === n.id ? 'active' : ''}`}
                onClick={() => setCurrentView(n.id)}
              >
                <I n={n.icon} /> {t(n.label, lang)}
              </button>
            ))}
          </aside>

          {/* Mobile Bottom Nav */}
          <nav className="bottomnav">
            {bottomItems.map(n => (
              <button key={n.id}
                className={`bottomnav-item ${currentView === n.id ? 'active' : ''}`}
                onClick={() => setCurrentView(n.id)}
              >
                <I n={n.icon} />
                <span>{t(n.label, lang)}</span>
              </button>
            ))}
          </nav>

          {/* Main Content */}

    // ============ WALK INTERFACE ============
    function WalkInterface({ walkId }) {
      const [observations, setObservations] = useState([]);
      const [walkInfo, setWalkInfo] = useState(null);
      const [newObs, setNewObs] = useState({
        title: '', description: '', category: '', observationArea: '',
        observationType: 'negative', location: '', personTagged: '', personMet: ''
      });
      const [aiSuggestion, setAiSuggestion] = useState(null);
      const [loading, setLoading] = useState(false);
      const [attachments, setAttachments] = useState([]);
      const [uploading, setUploading] = useState(false);
      const [isRecording, setIsRecording] = useState(false);
      const [lightboxSrc, setLightboxSrc] = useState(null);

      useEffect(() => { fetchWalkData(); }, [walkId]);

      const fetchWalkData = async () => {
        try {
          const response = await fetch(`/api/walks/walk-reports/${walkId}`);
          const data = await response.json();
          if (data.walk) { setWalkInfo(data.walk); setObservations(data.walk.observations || []); }
        } catch {}
      };

      const analyzeWithAI = async () => {
        if (!newObs.description.trim()) { alert('Please enter a description first'); return; }
        try {
          const response = await fetch('/api/ai/analyze', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ description: newObs.description })
          });
          const data = await response.json();
          setAiSuggestion(data);
          setNewObs(prev => ({ ...prev, category: data.category, observationArea: data.observationArea, observationType: data.observationType }));
        } catch {}
      };

      const handleFileUpload = async (e) => {
        const files = Array.from(e.target.files);
        if (!files.length) return;
        setUploading(true);
        try {
          const formData = new FormData();
          files.forEach(f => formData.append('files', f));
          const response = await fetch('/api/uploads/files', { method: 'POST', body: formData });
          const data = await response.json();
          if (data.files) setAttachments(prev => [...prev, ...data.files]);
        } catch { alert('Upload failed'); }
        finally { setUploading(false); e.target.value = ''; }
      };

      const removeAttachment = (idx) => setAttachments(prev => prev.filter((_, i) => i !== idx));

      const toggleVoice = () => {
        if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
          alert('Voice not supported. Use Chrome or Edge.'); return;
        }
        if (isRecording) { if (window._gembaRecognition) window._gembaRecognition.stop(); setIsRecording(false); return; }
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.continuous = true; recognition.interimResults = true; recognition.lang = 'en-IN';
        let finalTranscript = newObs.description;
        recognition.onresult = (event) => {
          let interim = '';
          for (let i = event.resultIndex; i < event.results.length; i++) {
            if (event.results[i].isFinal) finalTranscript += ' ' + event.results[i][0].transcript;
            else interim += event.results[i][0].transcript;
          }
          setNewObs(prev => ({ ...prev, description: finalTranscript.trim() + (interim ? ' ' + interim : '') }));
        };
        recognition.onerror = () => setIsRecording(false);
        recognition.onend = () => setIsRecording(false);
        recognition.start();
        window._gembaRecognition = recognition;
        setIsRecording(true);
      };

      const submitObservation = async () => {
        if (!newObs.title || !newObs.category || !newObs.observationArea) {
          alert('Please fill title, category, and area'); return;
        }
        const sanitizedObs = { ...newObs, title: sanitize(newObs.title), description: sanitize(newObs.description), location: sanitize(newObs.location), personTagged: sanitize(newObs.personTagged), personMet: sanitize(newObs.personMet) };
        setLoading(true);
        try {
          const response = await fetch('/api/walks/submit-observation', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ walkId, ...sanitizedObs, attachments })
          });
          if (response.ok) {
            setNewObs({ title: '', description: '', category: '', observationArea: '', observationType: 'negative', location: '', personTagged: '', personMet: '' });
            setAiSuggestion(null); setAttachments([]); fetchWalkData();
          }
        } catch { alert('Failed to submit'); }
        finally { setLoading(false); }
      };

      const completeWalk = async () => {
        try { await fetch(`/api/walks/complete/${walkId}`, { method: 'POST' }); fetchWalkData(); }
        catch { alert('Failed to complete walk'); }
      };

      const posCount = observations.filter(o => o.observationType === 'positive').length;
      const negCount = observations.filter(o => o.observationType === 'negative').length;

      return (
        <div>
          {lightboxSrc && (
            <div className="lightbox" onClick={() => setLightboxSrc(null)}>
              {lightboxSrc.type === 'video'
                ? <video src={lightboxSrc.url} controls autoPlay />
                : <img src={lightboxSrc.url} alt="Observation" />}
            </div>
          )}

          {/* Walk Header */}
          <div className="card">
            <div className="card-header">
              <div>
                <div className="card-title"><I n="directions_walk" /> {walkInfo?.title || 'Gemba Walk'}</div>
                <div className="card-subtitle">
                  {walkInfo?.walker && <>Walker: {walkInfo.walker} &middot; </>}
                  Started: {walkInfo ? new Date(walkInfo.createdAt).toLocaleString() : ''}
                  {walkInfo?.frequency && walkInfo.frequency !== 'adhoc' && <> &middot; {walkInfo.frequency}</>}
                </div>
              </div>
              {walkInfo?.status !== 'completed' ? (
                <button className="btn btn-danger" onClick={completeWalk}><I n="stop_circle" className="mi-sm" /> Complete Walk</button>
              ) : (
                <div style={{ display: 'flex', gap: '0.4rem', alignItems: 'center', flexWrap: 'wrap' }}>
                  <span className="status-badge status-completed">Completed</span>
                  <button className="btn btn-primary btn-sm" onClick={() => window.open(`/api/walks/summary/${walkId}`, '_blank')}>
                    <I n="description" className="mi-sm" /> Summary
                  </button>
                  <button className="btn btn-ghost btn-sm" onClick={() => {
                    const subject = encodeURIComponent(`Gemba Walk Summary: ${walkInfo?.title || 'Walk'}`);
                    const body = encodeURIComponent(
                      `Gemba Walk Summary\n\nTitle: ${walkInfo?.title}\nWalker: ${walkInfo?.walker}\nDate: ${new Date(walkInfo?.createdAt).toLocaleDateString()}\nObservations: ${observations.length} (${posCount} positive, ${negCount} improvements)\n\nView full summary:\n${window.location.origin}/api/walks/summary/${walkId}\n\n---\nSent from GembaRounds`
                    );
                    window.open(`mailto:?subject=${subject}&body=${body}`);
                  }}>
                    <I n="email" className="mi-sm" /> Email
                  </button>
                  <button className="btn btn-sm" style={{ background: '#25D366', color: 'white' }} onClick={() => {
                    const text = encodeURIComponent(
                      `*Gemba Walk Summary*\n\n*${walkInfo?.title}*\nWalker: ${walkInfo?.walker}\nDate: ${new Date(walkInfo?.createdAt).toLocaleDateString()}\nObservations: ${observations.length} (${posCount} good, ${negCount} improvements)\n\nView: ${window.location.origin}/api/walks/summary/${walkId}\n\n_Sent from GembaRounds_`
                    );
                    window.open(`https://wa.me/?text=${text}`);
                  }}>
                    <I n="chat" className="mi-sm" /> WhatsApp
                  </button>
                </div>
              )}
            </div>
          </div>

          {/* COACH Framework Progress */}
          {walkInfo?.status !== 'completed' && (
            <div className="card" style={{ padding: '1rem 1.25rem' }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem', marginBottom: '0.75rem' }}>
                <I n="school" style={{ color: 'var(--primary)' }} />
                <span style={{ fontWeight: 700, fontSize: '0.9rem' }}>COACH Framework</span>
                <span style={{ fontSize: '0.72rem', color: 'var(--text-muted)', marginLeft: 'auto' }}>PSS Methodology</span>
              </div>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)', gap: '0.35rem' }}>
                {[
                  { letter: 'C', word: 'Connect', icon: 'handshake', desc: 'Meet people on the floor', color: '#6366f1', done: observations.some(o => o.personMet) },
                  { letter: 'O', word: 'Observe', icon: 'visibility', desc: 'See the actual process', color: '#3b82f6', done: observations.length > 0 },
                  { letter: 'A', word: 'Appreciate', icon: 'thumb_up', desc: 'Acknowledge good work', color: '#10b981', done: posCount > 0 },
                  { letter: 'C', word: 'Conform', icon: 'checklist', desc: 'Check standards adherence', color: '#f59e0b', done: observations.some(o => o.observationArea === 'Adherence to Standards') },
                  { letter: 'H', word: 'Honing', icon: 'trending_up', desc: 'Highlight improvements', color: '#ef4444', done: negCount > 0 && observations.some(o => o.personTagged) },
                ].map((step, i) => (
                  <div key={i} style={{
                    textAlign: 'center', padding: '0.6rem 0.25rem', borderRadius: 'var(--radius-xs)',
                    background: step.done ? `${step.color}15` : 'var(--bg)',
                    border: `2px solid ${step.done ? step.color : 'var(--border)'}`,
                    transition: 'var(--transition)', position: 'relative'
                  }}>
                    {step.done && <I n="check_circle" style={{ position: 'absolute', top: 4, right: 4, fontSize: 14, color: step.color }} />}
                    <div style={{ width: 28, height: 28, borderRadius: '50%', background: step.color, color: 'white', display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 0.3rem', fontWeight: 800, fontSize: '0.82rem' }}>{step.letter}</div>
                    <div style={{ fontSize: '0.72rem', fontWeight: 700, color: step.done ? step.color : 'var(--text)' }}>{step.word}</div>
                    <div style={{ fontSize: '0.62rem', color: 'var(--text-muted)', marginTop: 2, lineHeight: 1.3 }}>{step.desc}</div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Stats */}
          <div className="stats-grid">
            <div className="stat-card"><div className="stat-value">{observations.length}</div><div className="stat-label">Total</div></div>
            <div className="stat-card"><div className="stat-value" style={{ color: 'var(--success)' }}>{posCount}</div><div className="stat-label">Good Things</div></div>
            <div className="stat-card"><div className="stat-value" style={{ color: 'var(--danger)' }}>{negCount}</div><div className="stat-label">Improvements</div></div>
          </div>

          {/* Observation Form */}
          {walkInfo?.status !== 'completed' && (
            <div className="card card-accent-left">
              <div className="card-title" style={{ marginBottom: '0.85rem' }}><I n="add_circle" /> Record Observation</div>

              <div className="toggle-group">
                <button className={`toggle-btn ${newObs.observationType === 'positive' ? 'active-pos' : ''}`}
                  onClick={() => setNewObs({...newObs, observationType: 'positive'})}>
                  <I n="thumb_up" className="mi-sm" /> Good Thing
                </button>
                <button className={`toggle-btn ${newObs.observationType === 'negative' ? 'active-neg' : ''}`}
                  onClick={() => setNewObs({...newObs, observationType: 'negative'})}>
                  <I n="build" className="mi-sm" /> Improvement
                </button>
              </div>

              <div className="form-group">
                <label className="form-label">Title</label>
                <input className="form-input" type="text" value={newObs.title} onChange={e => setNewObs({...newObs, title: e.target.value})} placeholder="Brief title of what you observed" />
              </div>
              <div className="form-group">
                <label className="form-label">Description</label>
                <textarea className="form-textarea" value={newObs.description} onChange={e => setNewObs({...newObs, description: e.target.value})} placeholder="Describe what you observed... or use voice" />
              </div>

              <div style={{ display: 'flex', flexWrap: 'wrap', gap: '0.4rem', marginBottom: '0.85rem' }}>
                <button className={`voice-btn ${isRecording ? 'recording' : ''}`} onClick={toggleVoice}>
                  <I n={isRecording ? 'stop' : 'mic'} className="mi-sm" /> {isRecording ? 'Stop' : 'Voice'}
                </button>
                <button className="btn btn-primary btn-sm" onClick={analyzeWithAI} disabled={!newObs.description.trim()}>
                  <I n="smart_toy" className="mi-sm" /> AI Categorize
                </button>
              </div>

              {aiSuggestion && (
                <div style={{ padding: '0.6rem 0.85rem', background: 'var(--purple-light)', borderRadius: 'var(--radius-xs)', marginBottom: '0.85rem', fontSize: '0.85rem' }}>
                  <strong>AI Suggests:</strong>
                  <span className={`tag ${catTag(aiSuggestion.category)}`} style={{ marginLeft: '0.4rem' }}>{aiSuggestion.category}</span>
                  <span className="tag tag-dark" style={{ marginLeft: '0.3rem' }}>{aiSuggestion.observationArea}</span>
                  <span className={`tag ${aiSuggestion.observationType === 'positive' ? 'tag-success' : 'tag-danger'}`} style={{ marginLeft: '0.3rem' }}>{aiSuggestion.observationType}</span>
                </div>

              <div className="upload-zone">
                <input type="file" accept="image/*,video/*" multiple onChange={handleFileUpload} capture="environment" />

              <div className="form-row" style={{ marginTop: '0.5rem' }}>
                <div className="form-group">
                  <label className="form-label">Observation Area (PSS)</label>
                  <select className="form-select" value={newObs.observationArea} onChange={e => setNewObs({...newObs, observationArea: e.target.value})}>

    // ============ SPAGHETTI DIAGRAM ============
    function SpaghettiDiagram({ walks }) {
      const locations = {};
      const connections = [];

      // Aggregate observations by location
      (walks || []).forEach(walk => {
        const walkLocs = [];
        (walk.observations || []).forEach(obs => {
          const loc = obs.location || 'Unknown';
          if (!locations[loc]) locations[loc] = { positive: 0, negative: 0, total: 0, categories: {} };
          locations[loc].total++;
          locations[loc][obs.observationType || 'negative']++;
          locations[loc].categories[obs.category || 'Other'] = (locations[loc].categories[obs.category || 'Other'] || 0) + 1;
          walkLocs.push(loc);
        });
        // Create connections between consecutive locations in the same walk
        for (let i = 0; i < walkLocs.length - 1; i++) {
          connections.push({ from: walkLocs[i], to: walkLocs[i+1] });
        }
      });

      const sortedLocs = Object.entries(locations).sort((a, b) => b[1].total - a[1].total);
      const maxCount = Math.max(...sortedLocs.map(([_, d]) => d.total), 1);

      if (sortedLocs.length === 0) return null;

      // Generate SVG positions in a circular layout
      const cx = 250, cy = 180, radius = 140;
      const posMap = {};
      sortedLocs.forEach(([loc], i) => {
        const angle = (2 * Math.PI * i / sortedLocs.length) - Math.PI / 2;
        posMap[loc] = { x: cx + radius * Math.cos(angle), y: cy + radius * Math.sin(angle) };
      });

      return (
        <div className="card">
          <div className="card-header">
            <div>
              <div className="card-title"><I n="route" /> Spaghetti Diagram</div>
              <div className="card-subtitle">Walk path and observation frequency by location</div>
            </div>
          </div>

          {/* SVG Diagram */}
          <div style={{ overflow: 'auto', margin: '0.5rem 0' }}>
            <svg viewBox="0 0 500 360" style={{ width: '100%', maxWidth: 500, margin: '0 auto', display: 'block' }}>
              {/* Connection lines */}
              {connections.map((conn, i) => {
                const from = posMap[conn.from], to = posMap[conn.to];
                if (!from || !to) return null;
                return <line key={i} x1={from.x} y1={from.y} x2={to.x} y2={to.y}
                  stroke="#6366f1" strokeWidth="1.5" opacity="0.25" strokeDasharray="4,4" />;
              })}
              {/* Location nodes */}
              {sortedLocs.map(([loc, data], i) => {
                const pos = posMap[loc];
                const size = 12 + (data.total / maxCount) * 22;
                const negRatio = data.negative / data.total;
                const color = negRatio > 0.6 ? '#ef4444' : negRatio > 0.3 ? '#f59e0b' : '#10b981';
                return (
                  <g key={loc}>
                    <circle cx={pos.x} cy={pos.y} r={size} fill={color} opacity="0.2" stroke={color} strokeWidth="2" />
                    <circle cx={pos.x} cy={pos.y} r={4} fill={color} />
                    <text x={pos.x} y={pos.y + size + 14} textAnchor="middle" fontSize="9" fontWeight="600" fill="#64748b">{loc.length > 18 ? loc.slice(0, 16) + '..' : loc}</text>
                    <text x={pos.x} y={pos.y + size + 24} textAnchor="middle" fontSize="8" fill="#94a3b8">{data.total} obs</text>
                  </g>
                );
              })}
            </svg>
          </div>

          {/* Location Table */}
          <div style={{ overflow: 'auto' }}>
            <table style={{ width: '100%', fontSize: '0.78rem', borderCollapse: 'collapse' }}>
              <thead>
                <tr style={{ background: 'var(--bg)' }}>
                  <td style={{ padding: '0.45rem 0.6rem', fontWeight: 700, borderBottom: '2px solid var(--border)' }}>Location</td>
                  <td style={{ padding: '0.45rem 0.6rem', fontWeight: 700, borderBottom: '2px solid var(--border)', textAlign: 'center' }}>Total</td>
                  <td style={{ padding: '0.45rem 0.6rem', fontWeight: 700, borderBottom: '2px solid var(--border)', textAlign: 'center', color: 'var(--success)' }}>Good</td>
                  <td style={{ padding: '0.45rem 0.6rem', fontWeight: 700, borderBottom: '2px solid var(--border)', textAlign: 'center', color: 'var(--danger)' }}>Issues</td>
                  <td style={{ padding: '0.45rem 0.6rem', fontWeight: 700, borderBottom: '2px solid var(--border)' }}>Frequency</td>
                </tr>
              </thead>
              <tbody>
                {sortedLocs.map(([loc, data]) => (
                  <tr key={loc}>
                    <td style={{ padding: '0.4rem 0.6rem', borderBottom: '1px solid var(--border)', fontWeight: 600 }}>{loc}</td>
                    <td style={{ padding: '0.4rem 0.6rem', borderBottom: '1px solid var(--border)', textAlign: 'center' }}>{data.total}</td>
                    <td style={{ padding: '0.4rem 0.6rem', borderBottom: '1px solid var(--border)', textAlign: 'center', color: 'var(--success)' }}>{data.positive}</td>
                    <td style={{ padding: '0.4rem 0.6rem', borderBottom: '1px solid var(--border)', textAlign: 'center', color: 'var(--danger)' }}>{data.negative}</td>
                    <td style={{ padding: '0.4rem 0.6rem', borderBottom: '1px solid var(--border)' }}>
                      <div style={{ width: `${(data.total/maxCount)*100}%`, minWidth: 8, height: 8, borderRadius: 4,
                        background: data.negative > data.positive ? 'var(--danger)' : 'var(--success)' }} />
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    // ============ SCHEDULE ============
    function SchedulePage() {
      const [formData, setFormData] = useState({ title: '', walker: '', frequency: 'weekly', scheduledDate: '', description: '' });
      const [scheduled, setScheduled] = useState([]);

      useEffect(() => { fetchScheduled(); }, []);
      const fetchScheduled = async () => {
        try { const d = await (await fetch('/api/walks/all')).json(); setScheduled((d.walks || []).filter(w => w.status === 'scheduled')); } catch {}
      };
      const scheduleWalk = async () => {
        if (!formData.scheduledDate) { alert('Select a date'); return; }
        try {
          await fetch('/api/walks/schedule', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(formData) });
          setFormData({ title: '', walker: '', frequency: 'weekly', scheduledDate: '', description: '' }); fetchScheduled();
        } catch { alert('Failed to schedule'); }
      };

      return (
        <div>
          <div className="page-header">
            <h1 className="page-title">Schedule Walks</h1>
            <p className="page-subtitle">PSS recommends: Ideally daily. Can be weekly, bimonthly, or monthly.</p>
          </div>

          <div className="card">
            <div className="card-title" style={{ marginBottom: '0.75rem' }}><I n="event" /> Schedule a Walk</div>
            <div className="form-row">
              <div className="form-group">
                <label className="form-label">Walk Title</label>
                <input className="form-input" type="text" value={formData.title} onChange={e => setFormData({...formData, title: e.target.value})} placeholder="e.g. Weekly Floor Walk" />
              </div>
              <div className="form-group">
                <label className="form-label">Walker</label>
                <input className="form-input" type="text" value={formData.walker} onChange={e => setFormData({...formData, walker: e.target.value})} placeholder="Who will conduct?" />
              </div>
            </div>
            <div className="form-row">
              <div className="form-group">
                <label className="form-label">Frequency</label>
                <select className="form-select" value={formData.frequency} onChange={e => setFormData({...formData, frequency: e.target.value})}>
                  {FREQUENCIES.map(f => <option key={f} value={f}>{f.charAt(0).toUpperCase() + f.slice(1)}</option>)}
                </select>
              </div>
              <div className="form-group">
                <label className="form-label">Date</label>
                <input className="form-input" type="date" value={formData.scheduledDate} onChange={e => setFormData({...formData, scheduledDate: e.target.value})} />
              </div>
            </div>
            <div className="form-group">
              <label className="form-label">Focus Area</label>
              <input className="form-input" type="text" value={formData.description} onChange={e => setFormData({...formData, description: e.target.value})} placeholder="Optional focus" />
            </div>
            <button className="btn btn-success" onClick={scheduleWalk}><I n="event_available" className="mi-sm" /> Schedule Walk</button>
          </div>

          <div className="card">
            <div className="card-title" style={{ marginBottom: '0.75rem' }}><I n="upcoming" /> Upcoming Walks</div>
            {scheduled.length === 0 ? (
              <div className="empty-state"><I n="event_busy" /><p>No walks scheduled yet.</p></div>
            ) : scheduled.map(w => (
              <div key={w._id} className="walk-item">
                <div className="walk-info">
                  <h4>{w.title || 'Scheduled Walk'}</h4>
                  <p>{w.walker && <>{w.walker} &middot; </>}{w.frequency}{w.scheduledDate && <> &middot; {new Date(w.scheduledDate).toLocaleDateString()}</>}</p>
                </div>
                <span className="status-badge status-scheduled">Scheduled</span>
              </div>
            ))}
          </div>

          <RecurringScheduler />
        </div>
      );
    }

    // ============ RECURRING SCHEDULER ============
    function RecurringScheduler() {
      const [recurring, setRecurring] = useState([]);
      const [form, setForm] = useState({ title: '', walker: '', frequency: 'daily', description: '' });

      useEffect(() => { fetchR(); }, []);
      const fetchR = async () => { try { setRecurring((await (await fetch('/api/walks/recurring')).json()).recurring || []); } catch {} };
      const addR = async () => {
        if (!form.frequency || form.frequency === 'adhoc') { alert('Select a frequency'); return; }
        const sanitizedForm = { ...form, title: sanitize(form.title), walker: sanitize(form.walker), description: sanitize(form.description) };
        try { await fetch('/api/walks/recurring', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(sanitizedForm) });
        setForm({ title: '', walker: '', frequency: 'daily', description: '' }); fetchR(); } catch {}
      };
      const removeR = async (id) => { try { await fetch(`/api/walks/recurring/${id}`, { method: 'DELETE' }); fetchR(); } catch {} };

      const cronDesc = { daily: 'Every weekday at 8:00 AM', weekly: 'Every Monday at 8:00 AM', bimonthly: '1st & 15th of month', monthly: '1st of each month' };

      return (
        <div className="card card-accent-purple">
          <div className="card-title" style={{ marginBottom: '0.3rem' }}><I n="autorenew" /> Auto-Recurring Walks</div>
          <div className="card-subtitle" style={{ marginBottom: '0.75rem' }}>Automatic walk creation on a schedule</div>
          <div className="form-row">
            <div className="form-group">
              <label className="form-label">Title</label>
              <input className="form-input" type="text" value={form.title} onChange={e => setForm({...form, title: e.target.value})} placeholder="Daily Morning Walk" />
            </div>
            <div className="form-group">
              <label className="form-label">Walker</label>
              <input className="form-input" type="text" value={form.walker} onChange={e => setForm({...form, walker: e.target.value})} placeholder="Who?" />
            </div>
          </div>
          <div className="form-row">
            <div className="form-group">
              <label className="form-label">Frequency</label>
              <select className="form-select" value={form.frequency} onChange={e => setForm({...form, frequency: e.target.value})}>
                <option value="daily">Daily</option><option value="weekly">Weekly</option>
                <option value="bimonthly">Bimonthly</option><option value="monthly">Monthly</option>
              </select>
            </div>
            <div className="form-group">
              <label className="form-label">Schedule</label>
              <div className="form-hint" style={{ marginTop: '0.6rem' }}>{cronDesc[form.frequency] || ''}</div>
            </div>
          </div>
          <button className="btn btn-success btn-sm" onClick={addR}><I n="add" className="mi-sm" /> Add Schedule</button>
          {recurring.length > 0 && (
            <div style={{ marginTop: '0.85rem' }}>
              {recurring.map(r => (
                <div key={r.id} className="walk-item">
                  <div className="walk-info">
                    <h4>{r.title || 'Recurring Walk'}</h4>
                    <p>{r.walker && <>{r.walker} &middot; </>}{r.frequency} &middot; {r.cronExpr}</p>
                  </div>
                  <button className="btn btn-danger btn-sm" onClick={() => removeR(r.id)}>Remove</button>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    // ============ EMPLOYEE SUGGESTION ============
    function EmployeeSuggestionBox() {
      const [form, setForm] = useState({ title: '', description: '', observationArea: '', location: '', submittedBy: '' });
      const [submitted, setSubmitted] = useState(false);
      const [points, setPoints] = useState(0);

      const submit = async () => {
        if (!form.title || !form.submittedBy) { alert('Name and title are required'); return; }
        const sanitizedForm = { ...form, title: sanitize(form.title), description: sanitize(form.description), location: sanitize(form.location), submittedBy: sanitize(form.submittedBy) };
        try {
          const data = await (await fetch('/api/walks/employee-suggestion', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(sanitizedForm) })).json();
          setPoints(data.kaizenPoints || 10); setSubmitted(true);
          setForm({ title: '', description: '', observationArea: '', location: '', submittedBy: '' });
          setTimeout(() => setSubmitted(false), 5000);
        } catch { alert('Failed to submit'); }
      };

      return (
        <div className="card card-accent-purple">
          <div className="card-title" style={{ marginBottom: '0.3rem' }}><I n="lightbulb" /> Employee Suggestion Box</div>
          <div className="card-subtitle" style={{ marginBottom: '0.75rem' }}>Share observations and earn Kaizen points!</div>
          {submitted ? (
            <div style={{ textAlign: 'center', padding: '1.5rem' }}>
              <div style={{ fontSize: '2rem', fontWeight: 800, color: 'var(--success)' }}>+{points} Points!</div>
              <p style={{ color: 'var(--text-secondary)' }}>Thank you! Your suggestion has been recorded.</p>
            </div>
          ) : (
            <>
              <div className="form-row">
                <div className="form-group">
                  <label className="form-label">Your Name *</label>
                  <input className="form-input" type="text" value={form.submittedBy} onChange={e => setForm({...form, submittedBy: e.target.value})} placeholder="Your name" />
                </div>
                <div className="form-group">
                  <label className="form-label">Suggestion Title *</label>
                  <input className="form-input" type="text" value={form.title} onChange={e => setForm({...form, title: e.target.value})} placeholder="What did you notice?" />
                </div>
              </div>
              <div className="form-group">
                <label className="form-label">Description</label>
                <textarea className="form-textarea" value={form.description} onChange={e => setForm({...form, description: e.target.value})} placeholder="Describe your idea..." style={{ minHeight: '60px' }} />
              </div>
              <div className="form-row">
                <div className="form-group">
                  <label className="form-label">Area</label>
                  <select className="form-select" value={form.observationArea} onChange={e => setForm({...form, observationArea: e.target.value})}>
                    <option value="">Select...</option>
                    {OBSERVATION_AREAS.map(a => <option key={a} value={a}>{a}</option>)}
                  </select>
                </div>
                <div className="form-group">
                  <label className="form-label">Location</label>
                  <input className="form-input" type="text" value={form.location} onChange={e => setForm({...form, location: e.target.value})} placeholder="Where?" />
                </div>
              </div>
              <button className="btn btn-success" onClick={submit}><I n="send" className="mi-sm" /> Submit</button>
            </>
          )}
        </div>
      );
    }

    // ============ KAIZEN LEADERBOARD ============
    function KaizenLeaderboard() {
      const [lb, setLb] = useState([]);

          <table className="data-table">
            <thead><tr><th>Rank</th><th>Name</th><th style={{ textAlign: 'center' }}>Contributions</th><th style={{ textAlign: 'center' }}>Points</th></tr></thead>

    // ============ ACTIONS ============
    function ActionsPage() {
      const [actions, setActions] = useState([]);
      const [summary, setSummary] = useState({ open: 0, inProgress: 0, closed: 0, total: 0 });
      const [filter, setFilter] = useState('all');

      useEffect(() => { fetchActions(); }, []);
      const fetchActions = async () => {
        try { const d = await (await fetch('/api/walks/actions')).json(); setActions(d.actions || []); setSummary(d.summary || {}); } catch {}
      };
      const updateAction = async (id, status, notes) => {
        try { await fetch(`/api/walks/action/${id}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ actionStatus: status, actionNotes: notes }) }); fetchActions(); } catch {}
      };

      const filtered = filter === 'all' ? actions : actions.filter(a => (a.actionStatus || 'open') === filter);

      return (
        <div>
          <div className="page-header">
            <h1 className="page-title">Action Tracker</h1>
            <p className="page-subtitle">Follow-through on all tagged action items</p>
          </div>

          <div className="stats-grid">
            {[
              { v: summary.total, l: 'Total', f: 'all', c: '' },
              { v: summary.open, l: 'Open', f: 'open', c: 'var(--danger)' },
              { v: summary.inProgress, l: 'In Progress', f: 'in-progress', c: 'var(--warning)' },
              { v: summary.closed, l: 'Closed', f: 'closed', c: 'var(--success)' },
            ].map((s, i) => (
              <div key={i} className={`stat-card clickable ${filter === s.f ? 'selected' : ''}`} onClick={() => setFilter(s.f)}>
                <div className="stat-value" style={s.c ? { color: s.c } : {}}>{s.v}</div>
                <div className="stat-label">{s.l}</div>
              </div>
            ))}
          </div>

          <div className="card">
            <div className="card-title" style={{ marginBottom: '0.75rem' }}><I n="task_alt" /> Actions ({filtered.length})</div>
            {filtered.length === 0 ? (
              <div className="empty-state"><I n="check_circle" /><p>No actions {filter !== 'all' ? `with "${filter}" status` : 'yet'}</p></div>
            ) : filtered.map(a => (
              <div key={a._id} className={`action-item action-${a.actionStatus || 'open'}`}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', flexWrap: 'wrap', gap: '0.75rem' }}>
                  <div style={{ flex: 1, minWidth: '200px' }}>
                    <div className="obs-title">{a.title}</div>
                    <div className="obs-tags" style={{ marginTop: '0.3rem' }}>
                      {a.observationArea && <span className="tag tag-dark">{a.observationArea}</span>}
                      {a.location && <span className="tag tag-neutral">{a.location}</span>}
                    </div>
                    <div className="obs-desc" style={{ marginTop: '0.3rem' }}>{a.description}</div>
                    <div className="obs-meta-row">
                      <span><I n="assignment_ind" className="mi-sm" /> {a.personTagged}</span>
                      {a.personMet && <span><I n="person" className="mi-sm" /> {a.personMet}</span>}
                      <span><I n="calendar_today" className="mi-sm" /> {new Date(a.timestamp).toLocaleDateString()}</span>
                    </div>
                    {a.actionNotes && <div style={{ marginTop: '0.3rem', fontSize: '0.82rem', fontStyle: 'italic', color: 'var(--text-muted)' }}>Note: {a.actionNotes}</div>}
                  </div>
                  <div style={{ display: 'flex', flexDirection: 'column', gap: '0.35rem', minWidth: '140px' }}>
                    <select className="form-select" value={a.actionStatus || 'open'} onChange={e => updateAction(a._id, e.target.value, a.actionNotes || '')}
                      style={{ padding: '0.4rem', fontSize: '0.82rem' }}>
                      <option value="open">Open</option><option value="in-progress">In Progress</option><option value="closed">Closed</option>
                    </select>
                    <input className="form-input" type="text" placeholder="Add note..." defaultValue={a.actionNotes || ''}
                      onBlur={e => { if (e.target.value !== (a.actionNotes || '')) updateAction(a._id, a.actionStatus || 'open', e.target.value); }}
                      style={{ padding: '0.4rem', fontSize: '0.82rem' }} />
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ============ HISTORY / SEARCH ============
    function HistoryPage() {
      const [query, setQuery] = useState('');
      const [filters, setFilters] = useState({ area: '', category: '', type: '', location: '' });
      const [results, setResults] = useState([]);
      const [repeatedIssues, setRepeatedIssues] = useState([]);
      const [total, setTotal] = useState(0);
      const [searched, setSearched] = useState(false);

      const doSearch = async () => {
        const params = new URLSearchParams();
        if (query) params.set('q', query);
        if (filters.area) params.set('area', filters.area);
        if (filters.category) params.set('category', filters.category);
        if (filters.type) params.set('type', filters.type);
        if (filters.location) params.set('location', filters.location);
        try {
          const d = await (await fetch(`/api/walks/search?${params}`)).json();
          setResults(d.results || []); setRepeatedIssues(d.repeatedIssues || []); setTotal(d.total || 0); setSearched(true);
        } catch { alert('Search failed'); }
      };

      return (
        <div>
          <div className="page-header">
            <h1 className="page-title">Search History</h1>
            <p className="page-subtitle">Find repeated issues and track patterns across walks</p>
          </div>

          <div className="card">
            <div className="form-group">
              <label className="form-label">Search</label>
              <input className="form-input" type="text" value={query} onChange={e => setQuery(e.target.value)}
                onKeyDown={e => { if (e.key === 'Enter') doSearch(); }}
                placeholder="Search by title, description, location, person..." />
            </div>
            <div className="form-row" style={{ marginBottom: '0.5rem' }}>
              <div className="form-group">
                <label className="form-label">Area</label>
                <select className="form-select" value={filters.area} onChange={e => setFilters({...filters, area: e.target.value})}>
                  <option value="">All Areas</option>
                  {OBSERVATION_AREAS.map(a => <option key={a} value={a}>{a}</option>)}
                </select>
              </div>
              <div className="form-group">
                <label className="form-label">Category</label>
                <select className="form-select" value={filters.category} onChange={e => setFilters({...filters, category: e.target.value})}>
                  <option value="">All</option>
                  {CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
                </select>
              </div>
            </div>
            <div className="form-row" style={{ marginBottom: '0.75rem' }}>
              <div className="form-group">
                <label className="form-label">Type</label>
                <select className="form-select" value={filters.type} onChange={e => setFilters({...filters, type: e.target.value})}>
                  <option value="">All</option>
                  <option value="positive">Good Things</option>
                  <option value="negative">Improvements</option>
                </select>
              </div>
              <div className="form-group">
                <label className="form-label">Location</label>
                <input className="form-input" type="text" value={filters.location} onChange={e => setFilters({...filters, location: e.target.value})} placeholder="e.g. Assembly Line" />
              </div>
            </div>
            <div style={{ display: 'flex', gap: '0.4rem' }}>
              <button className="btn btn-primary" onClick={doSearch}><I n="search" className="mi-sm" /> Search</button>
              <button className="btn btn-ghost" onClick={() => { setQuery(''); setFilters({ area: '', category: '', type: '', location: '' }); setResults([]); setRepeatedIssues([]); setSearched(false); }}>Clear</button>
            </div>
          </div>

          {repeatedIssues.length > 0 && (
            <div className="card card-accent-danger">
              <div className="card-title" style={{ color: 'var(--danger)', marginBottom: '0.5rem' }}><I n="warning" /> Repeated Issues</div>
              <div className="card-subtitle" style={{ marginBottom: '0.6rem' }}>Areas with multiple observations - recurring problems</div>
              {repeatedIssues.map((issue, idx) => (
                <div key={idx} className="notif-item notif-critical" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
                  <div>
                    <strong>{issue.area}</strong> at <strong>{issue.location}</strong>
                    <div style={{ fontSize: '0.8rem', color: 'var(--text-muted)', marginTop: '0.2rem' }}>
                      {issue.observations.map((o, i) => <div key={i}>{o.title} ({o.category}) - {new Date(o.date).toLocaleDateString()}</div>)}
                    </div>
                  </div>
                  <span className="tag tag-danger">{issue.count}x</span>
                </div>
              ))}
            </div>
          )}

          {searched && (
            <div className="card">
              <div className="card-title" style={{ marginBottom: '0.75rem' }}><I n="format_list_bulleted" /> Results ({total})</div>
              {results.length === 0 ? (
                <div className="empty-state"><I n="search_off" /><p>No observations found.</p></div>
              ) : results.map(obs => (
                <div key={obs._id} className={`obs-item type-${obs.observationType || 'negative'}`}>
                  <div className="obs-tags">
                    <span className={`tag ${obs.observationType === 'positive' ? 'tag-success' : 'tag-danger'}`}>
                      {obs.observationType === 'positive' ? 'Good' : 'Improve'}
                    </span>
                    <span className={`tag ${catTag(obs.category)}`}>{obs.category}</span>
                    {obs.observationArea && <span className="tag tag-dark">{obs.observationArea}</span>}
                  </div>
                  <div className="obs-title">{obs.title}</div>
                  <div className="obs-desc">{obs.description}</div>
                  <div className="obs-meta-row">
                    {obs.location && <span><I n="location_on" className="mi-sm" /> {obs.location}</span>}
                    {obs.personMet && <span><I n="person" className="mi-sm" /> {obs.personMet}</span>}
                    {obs.personTagged && <span><I n="assignment_ind" className="mi-sm" /> {obs.personTagged}</span>}
                  </div>
                  <div className="obs-time">{new Date(obs.timestamp).toLocaleString()}</div>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    // ============ ADMIN PAGE ============
    function AdminPage() {
      const [users, setUsers] = useState([]);
      const [loading, setLoading] = useState(true);
      const [editingUser, setEditingUser] = useState(null);

      useEffect(() => { fetchUsers(); }, []);
      const fetchUsers = async () => {
        try {
          const res = await fetch('/api/auth/users');
          const data = await res.json();
          setUsers(data.users || []);
        } catch {} finally { setLoading(false); }
      };

      const updateRole = async (userId, role) => {
        try {
          await fetch(`/api/auth/users/${userId}`, {
            method: 'PUT', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ role })
          });
          fetchUsers();
          setEditingUser(null);
        } catch { alert('Failed to update'); }
      };

      const deleteUser = async (userId, name) => {
        if (!confirm(`Delete user "${name}"? This cannot be undone.`)) return;
        try {
          await fetch(`/api/auth/users/${userId}`, { method: 'DELETE' });
          fetchUsers();
        } catch { alert('Failed to delete'); }
      };

      const roleCounts = {};
      users.forEach(u => { roleCounts[u.role] = (roleCounts[u.role] || 0) + 1; });

      return (
        <div>
          <div className="page-header">
            <h1 className="page-title">Admin Dashboard</h1>
            <p className="page-subtitle">Manage users, roles, and system settings</p>
          </div>

          {/* Stats */}
          <div className="stats-grid">
            <div className="stat-card"><div className="stat-value">{users.length}</div><div className="stat-label">Total Users</div></div>
            {['leader', 'manager', 'supervisor', 'operator'].map(role => (
              <div key={role} className="stat-card">
                <div className="stat-value">{roleCounts[role] || 0}</div>
                <div className="stat-label">{role.charAt(0).toUpperCase() + role.slice(1)}s</div>
              </div>
            ))}
          </div>

          {/* Users Table */}
          <div className="card">
            <div className="card-title" style={{ marginBottom: '0.75rem' }}><I n="people" /> User Management</div>
            {loading ? <p style={{ color: 'var(--text-muted)', fontSize: '0.85rem' }}>Loading...</p> : (
              <div style={{ overflow: 'auto' }}>
                <table style={{ width: '100%', fontSize: '0.8rem', borderCollapse: 'collapse' }}>
                  <thead>
                    <tr style={{ background: 'var(--bg)' }}>
                      <td style={{ padding: '0.5rem 0.6rem', fontWeight: 700, borderBottom: '2px solid var(--border)' }}>Name</td>
                      <td style={{ padding: '0.5rem 0.6rem', fontWeight: 700, borderBottom: '2px solid var(--border)' }}>Email</td>
                      <td style={{ padding: '0.5rem 0.6rem', fontWeight: 700, borderBottom: '2px solid var(--border)' }}>Role</td>
                      <td style={{ padding: '0.5rem 0.6rem', fontWeight: 700, borderBottom: '2px solid var(--border)' }}>Department</td>
                      <td style={{ padding: '0.5rem 0.6rem', fontWeight: 700, borderBottom: '2px solid var(--border)' }}>Joined</td>
                      <td style={{ padding: '0.5rem 0.6rem', fontWeight: 700, borderBottom: '2px solid var(--border)' }}>Actions</td>
                    </tr>
                  </thead>
                  <tbody>
                    {users.map(u => (
                      <tr key={u._id}>
                        <td style={{ padding: '0.4rem 0.6rem', borderBottom: '1px solid var(--border)', fontWeight: 600 }}>{u.name}</td>
                        <td style={{ padding: '0.4rem 0.6rem', borderBottom: '1px solid var(--border)', color: 'var(--text-secondary)' }}>{u.email}</td>
                        <td style={{ padding: '0.4rem 0.6rem', borderBottom: '1px solid var(--border)' }}>
                          {editingUser === u._id ? (
                            <select className="form-select" style={{ padding: '0.25rem', fontSize: '0.75rem' }}

                                <option key={r} value={r}>{r.charAt(0).toUpperCase() + r.slice(1)}</option>
                              )}

                          ) : (
                            <span className={`tag ${u.role === 'admin' ? 'tag-danger' : u.role === 'leader' ? 'tag-purple' : u.role === 'manager' ? 'tag-info' : u.role === 'supervisor' ? 'tag-warning' : 'tag-neutral'}`}>
                              {u.role}

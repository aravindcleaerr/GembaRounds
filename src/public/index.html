                          )}
                        </td>
                        <td style={{ padding: '0.4rem 0.6rem', borderBottom: '1px solid var(--border)', color: 'var(--text-muted)' }}>{u.department || '-'}</td>
                        <td style={{ padding: '0.4rem 0.6rem', borderBottom: '1px solid var(--border)', color: 'var(--text-muted)', fontSize: '0.72rem' }}>

            <div style={{ fontSize: '0.8rem', color: 'var(--text-secondary)', display: 'grid', gap: '0.3rem' }}>

              <div><strong>Version:</strong> 1.0.0</div>
            </div>
          </div>
        </div>
      );
    }

                    <div style={{ fontSize: '0.82rem', fontWeight: 700 }}>{u.name}</div>
                    <div style={{ fontSize: '0.72rem', color: 'var(--text-muted)' }}>{u.desc}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>

          {/* Similar Products - PSS #4 */}
          <div className="card" style={{ borderLeft: '4px solid var(--warning)' }}>
            <div className="card-title" style={{ marginBottom: '0.75rem' }}><I n="compare" /> How is GembaRounds Different?</div>
            <div style={{ overflow: 'auto' }}>
              <table style={{ width: '100%', fontSize: '0.78rem', borderCollapse: 'collapse' }}>
                <thead>
                  <tr style={{ background: 'var(--bg)', fontWeight: 700 }}>
                    <td style={{ padding: '0.5rem 0.75rem', borderBottom: '2px solid var(--border)' }}>Feature</td>
                    <td style={{ padding: '0.5rem 0.75rem', borderBottom: '2px solid var(--border)' }}>GembaRounds</td>
                    <td style={{ padding: '0.5rem 0.75rem', borderBottom: '2px solid var(--border)' }}>Others (iAuditor, Tulip)</td>
                  </tr>
                </thead>
                <tbody>
                  {[
                    ['PSS COACH Framework', 'Built-in', 'Not available'],
                    ['15 Observation Areas', 'Pre-configured', 'Generic checklists'],
                    ['AI Auto-categorization', 'Yes (Waste detection)', 'Limited/No'],
                    ['Voice Dictation', 'Built-in', 'Some paid plans'],
                    ['Kaizen Points System', 'Yes', 'No'],
                    ['Pricing', 'Free / Low cost', '$19-33/user/month'],
                    ['Indian Manufacturing Focus', 'Yes', 'Western-centric'],
                    ['Custom for SME', 'Yes', 'Enterprise-focused'],
                  ].map((row, i) => (
                    <tr key={i}>
                      <td style={{ padding: '0.4rem 0.75rem', borderBottom: '1px solid var(--border)', fontWeight: 600 }}>{row[0]}</td>
                      <td style={{ padding: '0.4rem 0.75rem', borderBottom: '1px solid var(--border)', color: 'var(--success)' }}>{row[1]}</td>
                      <td style={{ padding: '0.4rem 0.75rem', borderBottom: '1px solid var(--border)', color: 'var(--text-muted)' }}>{row[2]}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>

          {/* Investment - PSS #6 */}
          <div className="card" style={{ borderLeft: '4px solid var(--success)' }}>
            <div className="card-title" style={{ marginBottom: '0.75rem' }}><I n="payments" /> Investment & Costs</div>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(220px, 1fr))', gap: '0.75rem' }}>
              <div style={{ padding: '1rem', borderRadius: 'var(--radius-sm)', background: 'var(--success-light)', textAlign: 'center' }}>
                <div style={{ fontSize: '0.72rem', fontWeight: 600, color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: '0.05em' }}>Current (Beta)</div>
                <div style={{ fontSize: '1.75rem', fontWeight: 800, color: 'var(--success)', margin: '0.25rem 0' }}>FREE</div>
                <div style={{ fontSize: '0.75rem', color: 'var(--text-secondary)' }}>Vercel hosting + MongoDB Atlas free tier</div>
                <div style={{ fontSize: '0.72rem', color: 'var(--text-muted)', marginTop: 4 }}>Up to 100 users, 512 MB data</div>
              </div>
              <div style={{ padding: '1rem', borderRadius: 'var(--radius-sm)', background: 'var(--bg)', textAlign: 'center' }}>
                <div style={{ fontSize: '0.72rem', fontWeight: 600, color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: '0.05em' }}>Recurring (Production)</div>
                <div style={{ fontSize: '1.2rem', fontWeight: 800, color: 'var(--text)', margin: '0.25rem 0' }}>~$20-50/mo</div>
                <div style={{ fontSize: '0.75rem', color: 'var(--text-secondary)' }}>Vercel Pro + MongoDB M10 cluster</div>
                <div style={{ fontSize: '0.72rem', color: 'var(--text-muted)', marginTop: 4 }}>Unlimited users, 10 GB+ data</div>
              </div>
              <div style={{ padding: '1rem', borderRadius: 'var(--radius-sm)', background: 'var(--bg)', textAlign: 'center' }}>
                <div style={{ fontSize: '0.72rem', fontWeight: 600, color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: '0.05em' }}>Mobile App (Optional)</div>
                <div style={{ fontSize: '1.2rem', fontWeight: 800, color: 'var(--text)', margin: '0.25rem 0' }}>$25 + $99/yr</div>
                <div style={{ fontSize: '0.75rem', color: 'var(--text-secondary)' }}>Google Play ($25 one-time) + Apple ($99/yr)</div>
                <div style={{ fontSize: '0.72rem', color: 'var(--text-muted)', marginTop: 4 }}>PWA works free without app stores</div>
              </div>
            </div>
          </div>

          {/* Local Server - PSS #10 */}
          <div className="card" style={{ borderLeft: '4px solid var(--purple)' }}>
            <div className="card-title" style={{ marginBottom: '0.75rem' }}><I n="dns" /> Can Data Be Saved Locally?</div>
            <p style={{ fontSize: '0.85rem', color: 'var(--text-secondary)', lineHeight: 1.7, marginBottom: '0.5rem' }}>
              <strong>Yes!</strong> GembaRounds supports both cloud and local deployment:
            </p>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(220px, 1fr))', gap: '0.5rem' }}>
              {[
                { icon: 'cloud', title: 'Cloud (Current)', desc: 'MongoDB Atlas + Vercel. Data in cloud, accessible anywhere.' },
                { icon: 'computer', title: 'Local Server', desc: 'Install MongoDB locally. Run Node.js server. All data stays on-premise.' },
                { icon: 'security', title: 'Hybrid', desc: 'Local server with cloud backup. Best of both worlds.' },
              ].map((opt, i) => (
                <div key={i} style={{ padding: '0.6rem', borderRadius: 'var(--radius-xs)', background: 'var(--bg)', display: 'flex', gap: '0.5rem' }}>
                  <I n={opt.icon} style={{ color: 'var(--purple)', flexShrink: 0 }} />
                  <div>
                    <div style={{ fontSize: '0.82rem', fontWeight: 700 }}>{opt.title}</div>
                    <div style={{ fontSize: '0.72rem', color: 'var(--text-muted)' }}>{opt.desc}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>

          {/* Local Setup Steps */}
          <div className="card">
            <div className="card-title" style={{ marginBottom: '0.75rem' }}><I n="terminal" /> Local Server Setup (3 Steps)</div>
            <div style={{ display: 'grid', gap: '0.5rem' }}>
              {[
                { step: '1', title: 'Install Prerequisites', cmd: 'Install Node.js (v18+) and MongoDB Community Server from official sites' },
                { step: '2', title: 'Clone & Install', cmd: 'git clone https://github.com/aravindcleaerr/GembaRounds.git\ncd GembaRounds && npm install' },
                { step: '3', title: 'Run', cmd: 'Set MONGO_URI=mongodb://localhost:27017/gembarounds in .env\nnode src/server/index.js → Open http://localhost:3000' },
              ].map((s, i) => (
                <div key={i} style={{ display: 'flex', gap: '0.6rem', padding: '0.6rem', borderRadius: 'var(--radius-xs)', background: 'var(--bg)' }}>
                  <div style={{ width: 28, height: 28, borderRadius: '50%', background: 'var(--primary)', color: 'white', display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 800, fontSize: '0.8rem', flexShrink: 0 }}>{s.step}</div>
                  <div>
                    <div style={{ fontSize: '0.82rem', fontWeight: 700 }}>{s.title}</div>
                    <div style={{ fontSize: '0.72rem', color: 'var(--text-muted)', fontFamily: 'monospace', whiteSpace: 'pre-wrap' }}>{s.cmd}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>

          {/* Resistance & Adoption - PSS #5 */}
          <div className="card">
            <div className="card-title" style={{ marginBottom: '0.75rem' }}><I n="psychology" /> Adoption Challenges & Solutions</div>
            <div style={{ display: 'grid', gap: '0.4rem' }}>
              {[
                { challenge: 'Resistance to change from paper', solution: 'Start with one team, show quick wins, then expand' },
                { challenge: 'Managers too busy to use', solution: 'Voice dictation makes it faster than writing. Takes < 2 minutes per observation' },
                { challenge: 'Operators afraid of being reported', solution: 'Emphasis on appreciation (COACH-A). Positive observations build trust' },
                { challenge: 'Data entry fatigue', solution: 'AI auto-categorization, voice input, photo capture reduce manual entry' },
                { challenge: 'IT infrastructure concerns', solution: 'Works on any phone browser. No app install needed (PWA). Local server option available' },
              ].map((item, i) => (
                <div key={i} style={{ display: 'flex', gap: '0.6rem', padding: '0.5rem', borderRadius: 'var(--radius-xs)', background: 'var(--bg)', fontSize: '0.8rem' }}>
                  <I n="warning" style={{ color: 'var(--warning)', flexShrink: 0, marginTop: 2 }} />
                  <div>
                    <span style={{ fontWeight: 700 }}>{item.challenge}</span>
                    <span style={{ color: 'var(--success)', fontWeight: 600 }}> → {item.solution}</span>
                  </div>
                </div>
              ))}
            </div>
          </div>

          {/* Tech Stack */}
          <div className="card">
            <div className="card-title" style={{ marginBottom: '0.75rem' }}><I n="code" /> Technology</div>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: '0.35rem' }}>
              {['React 18', 'Node.js', 'Express', 'MongoDB Atlas', 'Chart.js', 'Vercel Serverless', 'JWT Auth', 'PWA', 'Speech API', 'AI Categorization'].map(t => (
                <span key={t} className="tag tag-dark">{t}</span>
              ))}
            </div>
          </div>

          {/* Credits */}
          <div className="card" style={{ textAlign: 'center', padding: '1.5rem' }}>
            <div style={{ fontSize: '0.85rem', fontWeight: 700, marginBottom: '0.5rem' }}>Credits</div>
            <div style={{ fontSize: '0.82rem', color: 'var(--text-secondary)' }}>
              Methodology: <strong>PS Satish Sir</strong> (COACH Framework)
            </div>
            <div style={{ fontSize: '0.82rem', color: 'var(--text-secondary)', marginTop: '0.2rem' }}>
              Development: <strong>Aravind & Team</strong> with AI assistance
            </div>
            <div style={{ fontSize: '0.72rem', color: 'var(--text-muted)', marginTop: '0.75rem' }}>
              &copy; {new Date().getFullYear()} GembaRounds. All rights reserved.
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ErrorBoundary><App /></ErrorBoundary>);

    // PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
